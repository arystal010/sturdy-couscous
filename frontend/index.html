<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">

    <title>Arys AI</title>

    <meta name="theme-color" content="#0f172a">

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/themes.css">
    <link rel="stylesheet" href="./css/animations.css">
    <link rel="stylesheet" href="./css/chat.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script type="module" src="./js/app.js" defer></script>
</head>

<body class="dark">

    <div id="app">

        <header class="topbar">
            <button id="newChatBtn" class="icon-btn" title="New chat">＋</button>
            <div class="logo">
                <div class="logo-icon">AI</div>
                <span>Arys AI</span>
            </div>
            <button id="themeBtn" class="icon-btn" title="Toggle theme">☀️</button>
        </header>

        <main id="chatContainer">
            <div id="messages">
                <section class="welcome">
                    <h1>What can I help with?</h1>
                    <p>Conversations are temporary.</p>
                </section>
            </div>
            <button id="scrollBottomBtn" title="Scroll to bottom">↓</button>
        </main>

        <footer class="composer">
            <div class="input-box">
                <textarea id="prompt" rows="1" placeholder="Message Arys AI..."></textarea>
                <div class="composer-actions">
                    <button id="stopBtn" class="secondary" hidden>Stop</button>
                    <button id="sendBtn" class="primary">Send</button>
                </div>
            </div>
            <div class="footer-text">AI can make mistakes. Verify important information.</div>
        </footer>

    </div>

</body>

</html>
